framework:
    cache:
        # Store "app" cache in Redis so LLM re-ranking caching works without
        # depending on the exact pool service id.
        app: cache.adapter.redis
        # Redis connection used for the LLM cache pool.
        default_redis_provider: '%env(resolve:REDIS_URL)%'

        pools:
            llm_recommendations:
                # Store ranked_ids per (user + interests) to avoid repeated Ollama calls.
                adapters: [cache.adapter.redis]
                default_lifetime: '%env(int:LLM_CACHE_TTL_SECONDS)%'
