lexik_jwt_authentication:
    secret_key: '%env(resolve:JWT_SECRET_KEY)%'
    public_key: '%env(resolve:JWT_PUBLIC_KEY)%'
    pass_phrase: '%env(JWT_PASSPHRASE)%'
    # TTL court : le refresh token prolonge la session (voir gesdinet + JWT_REFRESH_TTL).
    token_ttl: '%env(int:default:jwt_token_ttl_default:JWT_TOKEN_TTL)%'
