monolog:
    channels:
        - deprecation

when@dev:
    monolog:
        handlers:
            main:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug
                channels: ["!event"]
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine", "!console"]

when@prod:
    monolog:
        handlers:
            main:
                type: stream
                # En conteneur : écrire sur stderr (récupéré par `docker logs`) plutôt
                # qu'un fichier, pour éviter les 500 dus aux permissions sur var/log.
                path: php://stderr
                level: warning
                channels: ["!event", "!deprecation"]
            deprecation:
                type: stream
                path: php://stderr
                channels: [deprecation]

when@test:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                channels: ["!event"]
            nested:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug
