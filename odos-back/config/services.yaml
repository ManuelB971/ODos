# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    app.uploads.activities.dir: '%kernel.project_dir%/public/uploads/activities'
    app.uploads.activities.public_prefix: '/uploads/activities'
    app.uploads.avatars.dir: '%kernel.project_dir%/public/uploads/avatars'
    app.uploads.avatars.public_prefix: '/uploads/avatars'
    app.uploads.badges.dir: '%kernel.project_dir%/public/uploads/badges'
    app.uploads.badges.public_prefix: '/uploads/badges'
    app.uploads.parcours.dir: '%kernel.project_dir%/public/uploads/parcours'
    app.uploads.parcours.public_prefix: '/uploads/parcours'
    app.llm.base_url: '%env(LLM_BASE_URL)%'
    app.llm.model: '%env(LLM_MODEL)%'
    app.llm.timeout: '%env(int:LLM_TIMEOUT)%'
    app.llm.top_k: '%env(int:LLM_TOP_K)%'
    app.llm.candidate_max: '%env(int:LLM_CANDIDATE_MAX)%'
    app.llm.enabled: '%env(bool:LLM_ENABLED)%'
    app.llm.cache_ttl_seconds: '%env(int:LLM_CACHE_TTL_SECONDS)%'
    app.admin.mfa_enabled: '%env(bool:ADMIN_MFA_ENABLED)%'
    # Recommandations — collaborative filtering (poids des signaux, taille du pool CF).
    app.reco.visit_weight: '%env(float:default:reco_visit_weight_default:RECO_VISIT_WEIGHT)%'
    app.reco.favorite_weight: '%env(float:default:reco_favorite_weight_default:RECO_FAVORITE_WEIGHT)%'
    app.reco.candidate_limit: '%env(int:default:reco_candidate_limit_default:RECO_CANDIDATE_LIMIT)%'
    # Fallbacks for env(default:…:VAR) — must be parameter names, not literal numbers.
    reco_visit_weight_default: 2.0
    reco_favorite_weight_default: 1.0
    reco_candidate_limit_default: 50
    jwt_token_ttl_default: 900
    jwt_refresh_ttl_default: 2592000
    app.oauth.apple_client_id_default: ''
    app.mailer.from_default: 'ODos <noreply@odos.world>'
    app.mobile.scheme_default: 'odosfront'
    app.oauth.google_client_ids_default: ''
    app.wazuh.dashboard_url_default: ''
    app.wazuh.dashboard_url: '%env(default:app.wazuh.dashboard_url_default:WAZUH_DASHBOARD_URL)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
    App\State\UserRegistrationProcessor:
        decorates: App\State\UserPasswordHasherProcessor
        arguments:
            $innerProcessor: '@.inner'

    App\State\UserPasswordHasherProcessor:
        arguments:
            $innerProcessor: '@api_platform.doctrine.orm.state.persist_processor'

    App\State\UserRemoveProcessor:
        decorates: api_platform.doctrine.orm.state.remove_processor
        arguments:
            $innerProcessor: '@.inner'

    App\Service\UserDeletionService:
        arguments:
            $avatarUploadDir: '%app.uploads.avatars.dir%'
            $avatarPublicPrefix: '%app.uploads.avatars.public_prefix%'

    App\EventSubscriber\ApiRateLimitSubscriber:
        arguments:
            $apiLoginLimiter: '@limiter.api_login'
            $apiRegisterLimiter: '@limiter.api_register'
            $apiSocialAuthLimiter: '@limiter.api_social_auth'
            $apiPasswordResetRequestLimiter: '@limiter.api_password_reset_request'
            $apiPasswordResetConfirmLimiter: '@limiter.api_password_reset_confirm'

    App\Service\Auth\PasswordResetService:
        arguments:
            $mailerFrom: '%env(default:app.mailer.from_default:MAILER_FROM)%'
            $mobileAppScheme: '%env(default:app.mobile.scheme_default:APP_MOBILE_SCHEME)%'
            $debugMode: '%kernel.debug%'

    App\Service\JwtAuthResponseFactory:
        arguments:
            $refreshTokenTtl: '%env(int:default:jwt_refresh_ttl_default:JWT_REFRESH_TTL)%'

    App\Service\Auth\OAuthClientIdParser:
        arguments:
            $googleClientIdsRaw: '%env(default:app.oauth.google_client_ids_default:GOOGLE_OAUTH_CLIENT_IDS)%'

    App\Service\Auth\GoogleIdTokenVerifier:
        arguments:
            $allowedClientIds: '@=service("App\\Service\\Auth\\OAuthClientIdParser").googleIds()'

    App\Service\Auth\AppleIdTokenVerifier:
        arguments:
            $appleClientId: '%env(default:app.oauth.apple_client_id_default:APPLE_CLIENT_ID)%'

    App\Monolog\SensitiveDataProcessor:
        tags:
            - { name: monolog.processor }

    App\Service\ActivityPhotoUploader:
        arguments:
            $uploadDir: '%app.uploads.activities.dir%'
            $publicPathPrefix: '%app.uploads.activities.public_prefix%'

    App\Service\UserAvatarUploader:
        arguments:
            $uploadDir: '%app.uploads.avatars.dir%'
            $publicPathPrefix: '%app.uploads.avatars.public_prefix%'

    App\Service\BadgePhotoUploader:
        arguments:
            $uploadDir: '%app.uploads.badges.dir%'
            $publicPathPrefix: '%app.uploads.badges.public_prefix%'

    App\Controller\UserAvatarController:
        arguments:
            $uploadDir: '%app.uploads.avatars.dir%'
            $publicPrefix: '%app.uploads.avatars.public_prefix%'

    App\Service\ParcoursCoverUploader:
        arguments:
            $uploadDir: '%app.uploads.parcours.dir%'
            $publicPathPrefix: '%app.uploads.parcours.public_prefix%'

    App\Controller\ParcoursController:
        arguments:
            $uploadDir: '%app.uploads.parcours.dir%'
            $publicPrefix: '%app.uploads.parcours.public_prefix%'

    App\Controller\Admin\DashboardController:
        arguments:
            $wazuhDashboardUrl: '%app.wazuh.dashboard_url%'

    App\EventSubscriber\AdminMfaSubscriber:
        arguments:
            $mfaEnabled: '%app.admin.mfa_enabled%'

    App\Service\LlmRankingService:
        arguments:
            $cacheTtlSeconds: '%app.llm.cache_ttl_seconds%'
            $llmBaseUrl: '%app.llm.base_url%'
            $llmModel: '%app.llm.model%'
            $llmTimeout: '%app.llm.timeout%'
            $topK: '%app.llm.top_k%'
            $candidateMax: '%app.llm.candidate_max%'
            $llmEnabled: '%app.llm.enabled%'

    # Moteur de recommandation : politique (poids CF) injectée par config.
    App\Recommendation\CollaborativeRecommendationEngine:
        arguments:
            $visitWeight: '%app.reco.visit_weight%'
            $favoriteWeight: '%app.reco.favorite_weight%'
            $candidateLimit: '%app.reco.candidate_limit%'

    # Implémentation active de l'algo. Pour en changer (A-B test, futur moteur ML),
    # il suffit de réaliaser cette interface vers une autre classe.
    App\Recommendation\RecommendationEngineInterface: '@App\Recommendation\CollaborativeRecommendationEngine'
