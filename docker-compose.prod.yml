services:
  php:
    build:
      target: prod
      args:
        # Optionnel : PAT GitHub (read:packages) pour éviter les 403/400 codeload sur le VPS.
        COMPOSER_GITHUB_TOKEN: ${COMPOSER_GITHUB_TOKEN:-}
    env_file:
      - ${ODOS_CONFIG_DIR:-~/odos-config}/.env
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
    volumes:
      - ${ODOS_CONFIG_DIR:-~/odos-config}/.env:/app/.env:ro
      - ${ODOS_CONFIG_DIR:-~/odos-config}/jwt/private.pem:/app/config/jwt/private.pem:ro
      - ${ODOS_CONFIG_DIR:-~/odos-config}/jwt/public.pem:/app/config/jwt/public.pem:ro
      # même espace pour PHP (écriture) et nginx (lecture) : avatars / photos admin
      - odos_public_uploads:/app/public/uploads

  nginx:
    volumes:
      - odos_public_uploads:/app/public/uploads:ro

  llm:
    profiles:
      - llm

volumes:
  odos_public_uploads:
