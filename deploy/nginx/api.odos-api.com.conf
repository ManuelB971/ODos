# Nginx sur le VPS (hôte) — phase 1 : HTTP uniquement.
# Les fichiers /etc/letsencrypt/* n'existent pas encore : ne pas activer SSL ici.
#
# Install :
#   sudo cp ~/ODos/deploy/nginx/api.odos-api.com.conf /etc/nginx/sites-available/api.odos-api.com
#   sudo ln -sf /etc/nginx/sites-available/api.odos-api.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Puis HTTPS (certbot crée le bloc 443 et options-ssl-nginx.conf) :
#   sudo certbot --nginx -d api.odos-api.com
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name api.odos-api.com;

    client_max_body_size 20M;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
