# Nginx sur le VPS (hôte), pas dans Docker.
# Installe : /etc/nginx/sites-available/api.odos-api.com
# Puis     : ln -s ... sites-enabled/ && nginx -t && systemctl reload nginx
#
# Prérequis DNS : api.odos-api.com → IP du VPS (A record)
# Docker ODos    : écoute en 127.0.0.1:8000 (APP_HTTP_PORT=8000)

server {
    listen 80;
    listen [::]:80;
    server_name api.odos-api.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.odos-api.com;

    # Certbot remplit ces chemins (certbot --nginx -d api.odos-api.com)
    ssl_certificate     /etc/letsencrypt/live/api.odos-api.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.odos-api.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
