# Nginx sur le VPS (hôte) — web app ODOS (Expo export statique).
# Phase 1 : HTTP uniquement (certbot crée ensuite le bloc 443).
#
# Pré-requis :
#   - DNS : app.odos.world (A record) → IP du VPS.
#   - Build déployé dans /var/www/odos-web (voir docs/WEB_APP_DEPLOYMENT.md).
#
# Install :
#   sudo cp ~/ODos/deploy/nginx/app.odos.world.conf /etc/nginx/sites-available/app.odos.world
#   sudo ln -sf /etc/nginx/sites-available/app.odos.world /etc/nginx/sites-enabled/
#   sudo mkdir -p /var/www/odos-web
#   sudo nginx -t && sudo systemctl reload nginx
#
# Puis HTTPS (certbot crée le bloc 443 + la redirection 80→443) :
#   sudo certbot --nginx -d app.odos.world
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name app.odos.world;

    root /var/www/odos-web;
    index index.html;

    # Challenge Let's Encrypt (avant émission du certificat).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Assets hashés (immutables) → cache long.
    location /_expo/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Fallback SPA : toute route inconnue (expo-router) sert index.html.
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Durcissement minimal (l'API a son propre CORS/headers).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
